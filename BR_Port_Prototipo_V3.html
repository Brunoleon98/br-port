<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>BR Port — v3.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    html { height: 100%; overflow-y: auto; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --navy:    #1c3454;
      --navy2:   #24466e;
      --amber:   #e09a10;
      --amber2:  #f5b93a;
      --cream:   #f0f6ff;
      --white:   #ffffff;
      --red:     #c23030;
      --redbg:   #fff0f0;
      --green:   #1a7a40;
      --greenbg: #edfbf2;
      --orange:  #c85420;
      --orangebg:#fff4ee;
      --gray:    #8299b4;
      --border:  #d0dff0;
      --warn:    #d97706;
      --warnbg:  #fffbeb;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(180deg, #dceeff 0%, #c8dcf5 100%);
      background-attachment: fixed;
      color: var(--navy);
      min-height: 100vh;
      user-select: none;
      overflow-y: auto;
    }

    /* ── GUIDE BAR ─────────────────────────────────────────── */
    .guide-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 150;
      background: var(--navy);
      padding: 10px 16px;
      display: none;
      align-items: center;
      gap: 10px;
      box-shadow: 0 3px 16px rgba(0,0,0,0.35);
    }
    .guide-step-num {
      font-family: 'Oswald', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--amber2);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .guide-msg {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      flex: 1;
      line-height: 1.3;
    }
    .guide-skip {
      font-size: 10px;
      color: #8299b4;
      cursor: pointer;
      text-decoration: underline;
      white-space: nowrap;
      flex-shrink: 0;
    }
    @keyframes guidePulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(224,154,16,0.8); }
      50%       { box-shadow: 0 0 0 8px rgba(224,154,16,0); }
    }
    .guide-pulse { animation: guidePulse 1s ease-in-out infinite !important; }

    /* ── WRAP ─────────────────────────────────────────────── */
    .wrap {
      max-width: 420px;
      margin: 0 auto;
      padding: 12px 12px 130px;
      transition: padding-top 0.2s;
      min-height: 100vh;
    }

    /* ── HEADER ───────────────────────────────────────────── */
    .header { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 0 8px; }
    .header-anchor { font-size: 26px; }
    .header-title { font-family: 'Oswald', sans-serif; font-size: 26px; font-weight: 700; color: var(--navy); letter-spacing: 1px; }
    .header-sub { text-align: center; font-size: 10px; color: var(--gray); margin-bottom: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }

    /* ── HUD ──────────────────────────────────────────────── */
    .hud { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 8px; }
    .hud-card { background: var(--white); border-radius: 12px; padding: 10px 8px; text-align: center; box-shadow: 0 2px 8px rgba(28,52,84,0.08); }
    .hud-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--gray); margin-bottom: 4px; }
    .hud-value { font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 700; line-height: 1; color: var(--navy); }
    .hud-sub { font-size: 10px; color: var(--gray); margin-top: 3px; font-weight: 600; }
    .cash-ok   { color: var(--green) !important; }
    .cash-warn { color: var(--warn) !important; }
    .cash-bad  { color: var(--red) !important; }

    /* ── PARCELAS ─────────────────────────────────────────── */
    .parcelas-row { display: flex; gap: 5px; margin-bottom: 8px; }
    .p-chip {
      flex: 1; text-align: center; font-size: 9px; font-weight: 700;
      padding: 6px 3px; border-radius: 10px; border: 2px solid; line-height: 1.5;
    }
    .p-paid   { background: var(--greenbg); border-color: #7ddba0; color: var(--green); }
    .p-due    { background: var(--warnbg); border-color: var(--amber2); color: var(--warn);
                animation: pulse-due 1.2s ease-in-out infinite; }
    .p-future { background: #f1f7ff; border-color: var(--border); color: var(--gray); }
    .p-hidden { background: #f1f7ff; border-color: #b0c4de; border-style: dashed; color: #a0b4cc; }
    @keyframes pulse-due {
      0%, 100% { box-shadow: 0 0 0 0 rgba(224,154,16,0.3); }
      50%       { box-shadow: 0 0 0 4px rgba(224,154,16,0.12); }
    }

    /* ── REPUTAÇÃO ────────────────────────────────────────── */
    .rep-row {
      background: var(--white); border-radius: 12px; padding: 9px 14px;
      margin-bottom: 8px; display: flex; align-items: center; gap: 10px;
      box-shadow: 0 2px 8px rgba(28,52,84,0.06);
    }
    .rep-emoji { font-size: 16px; flex-shrink: 0; }
    .rep-label { font-size: 10px; font-weight: 700; color: var(--gray); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
    .rep-bar-outer { flex: 1; height: 8px; background: #e0eaf6; border-radius: 99px; overflow: hidden; }
    .rep-bar-inner { height: 100%; border-radius: 99px; transition: width 0.5s, background 0.5s; }
    .rep-text { font-size: 11px; font-weight: 800; white-space: nowrap; }
    .rep-warning { font-size: 10px; color: var(--red); font-weight: 700; white-space: nowrap; }

    /* ── OBJETIVO SEMANAL ─────────────────────────────────── */
    .obj-card {
      background: var(--white); border-radius: 12px; padding: 10px 14px;
      margin-bottom: 8px; display: flex; align-items: center; gap: 10px;
      box-shadow: 0 2px 8px rgba(28,52,84,0.06);
      border-left: 4px solid var(--amber);
    }
    .obj-card.obj-done { border-left-color: var(--green); background: var(--greenbg); }
    .obj-icon { font-size: 20px; flex-shrink: 0; }
    .obj-body { flex: 1; }
    .obj-label { font-size: 12px; font-weight: 800; color: var(--navy); }
    .obj-sub   { font-size: 10px; color: var(--gray); font-weight: 600; margin-top: 1px; }
    .obj-badge { font-size: 10px; font-weight: 800; white-space: nowrap; flex-shrink: 0; padding: 4px 8px; border-radius: 99px; }
    .obj-badge-pen  { background: #fff3cd; color: #7a4f00; }
    .obj-badge-done { background: var(--greenbg); color: var(--green); }

    /* ── EVENTO SEMANAL ───────────────────────────────────── */
    .event-card {
      border-radius: 12px; padding: 10px 14px; margin-bottom: 8px;
      display: flex; align-items: flex-start; gap: 10px; border: 2px solid;
    }
    .event-emoji { font-size: 22px; flex-shrink: 0; margin-top: 2px; }
    .event-title { font-size: 13px; font-weight: 800; }
    .event-desc  { font-size: 11px; margin-top: 2px; line-height: 1.4; opacity: 0.8; }
    .ev-tempestade   { background: #eff6ff; border-color: #93c5fd; color: #1e3a6e; }
    .ev-fiscalizacao { background: var(--warnbg); border-color: var(--amber2); color: #6b3c00; }
    .ev-demanda      { background: var(--greenbg); border-color: #7ddba0; color: #0f5028; }

    /* ── SECTION LABEL ────────────────────────────────────── */
    .sec { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--gray); margin: 10px 0 5px; }

    /* ── DOCAS ────────────────────────────────────────────── */
    .doca {
      background: var(--white); border: 2px solid var(--border); border-radius: 14px;
      padding: 10px 12px; margin-bottom: 8px; display: flex; align-items: center;
      gap: 10px; min-height: 66px; transition: border-color 0.15s, box-shadow 0.15s; cursor: pointer;
    }
    .doca.empty      { background: #f4f9ff; border-style: dashed; border-color: #c0d4ed; }
    .doca.target     { border-color: #4c9df5; box-shadow: 0 0 0 3px rgba(76,157,245,0.25); }
    .doca.rival-pending { border-color: var(--red); box-shadow: 0 0 0 3px rgba(194,48,48,0.15); }
    .doca-num { font-family: 'Oswald', sans-serif; font-size: 10px; font-weight: 500; color: var(--gray); text-transform: uppercase; width: 30px; flex-shrink: 0; text-align: center; line-height: 1.3; }
    .boat-badge { width: 48px; height: 48px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; font-size: 22px; line-height: 1; }
    .boat-small   { background: #dbeafe; }
    .boat-large   { background: #bfdbfe; }
    .boat-rival-b { background: var(--redbg); animation: rival-flash 1s ease-in-out infinite; }
    @keyframes rival-flash { 0%,100%{background:#ffe4e4;} 50%{background:#ffd0d0;} }
    .boat-badge-sub { font-size: 8px; font-weight: 800; color: #475569; margin-top: 1px; letter-spacing: 0.5px; }
    .boat-info { flex: 1; font-size: 12px; line-height: 1.5; }
    .boat-revenue  { font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 700; color: var(--navy); }
    .boat-discount { color: var(--orange); font-size: 12px; }
    .boat-progress { font-size: 11px; color: var(--gray); font-weight: 600; }
    .boat-worker   { font-size: 11px; color: var(--green); font-weight: 700; margin-top: 2px; }
    .boat-bonus    { font-size: 10px; color: #7b5ea7; font-weight: 700; }
    .rival-decision { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
    .rival-decision button { font-family: 'Nunito', sans-serif; font-size: 10px; font-weight: 800; padding: 6px 10px; border: none; border-radius: 8px; cursor: pointer; text-align: center; line-height: 1.3; }
    .btn-ig { background: var(--orange); color: #fff; }
    .btn-rc { background: #8299b4; color: #fff; }

    /* ── WORKERS ──────────────────────────────────────────── */
    .workers { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .wbtn { flex: 1; min-width: 72px; height: 64px; border-radius: 12px; border: 2px solid; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; transition: transform 0.1s; }
    .wbtn:active { transform: scale(0.94); }
    .wfree { background: var(--greenbg); border-color: #7ddba0; }
    .wsel  { background: #dbeafe; border-color: #60a5fa; box-shadow: 0 0 0 3px rgba(96,165,250,0.25); }
    .wbusy { background: #f4f9ff; border-color: var(--border); cursor: default; opacity: 0.55; }
    .wsub  { font-size: 10px; font-weight: 700; color: var(--gray); margin-top: 3px; }

    /* ── UPGRADES ─────────────────────────────────────────── */
    .upgrade-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .upg-btn {
      background: #f0f6ff; border: 2px solid var(--border); border-radius: 12px;
      padding: 10px 8px; cursor: pointer; font-family: 'Nunito', sans-serif;
      font-size: 11px; font-weight: 700; color: var(--navy); text-align: center;
      line-height: 1.5; transition: all 0.15s;
    }
    .upg-btn:active:not(:disabled) { transform: scale(0.97); }
    .upg-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .upg-btn.upg-done { background: var(--greenbg); border-color: #7ddba0; color: var(--green); }
    .upg-btn.upg-afford { border-color: var(--amber); background: var(--warnbg); }
    .upg-cost { font-size: 13px; font-family: 'Oswald', sans-serif; font-weight: 700; display: block; }
    .upg-sub  { font-size: 9px; font-weight: 600; color: var(--gray); display: block; margin-top: 1px; }

    /* ── MSG ──────────────────────────────────────────────── */
    .msg-box { border-radius: 12px; padding: 11px 14px; font-size: 12px; min-height: 42px; margin: 8px 0; line-height: 1.5; font-weight: 600; border: 2px solid; }
    .msg-default { background: var(--white); border-color: var(--border); color: #374151; }
    .msg-warn    { background: var(--warnbg); border-color: var(--amber2); color: #78420a; }
    .msg-good    { background: var(--greenbg); border-color: #7ddba0; color: #0e5028; }
    .msg-bad     { background: var(--redbg); border-color: #f5a0a0; color: var(--red); }

    /* ── ACTION BUTTONS ───────────────────────────────────── */
    .btn-adv-wrap {
      position: fixed;
      bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 420px;
      z-index: 90;
      background: linear-gradient(0deg, #c8dcf5 75%, rgba(200,220,245,0) 100%);
      padding: 14px 12px 20px;
      pointer-events: none;
    }
    .btn-adv {
      pointer-events: all;
      display: block; width: 100%; background: var(--navy); color: #fff; border: none;
      border-radius: 14px; padding: 16px 8px; font-family: 'Oswald', sans-serif;
      font-size: 19px; font-weight: 700; letter-spacing: 0.5px; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      box-shadow: 0 4px 18px rgba(28,52,84,0.35);
    }
    .btn-adv:hover:not(:disabled) { background: var(--navy2); }
    .btn-adv:active:not(:disabled) { transform: scale(0.98); }
    .btn-adv:disabled { opacity: 0.35; cursor: default; }

    /* ── OVERLAYS ─────────────────────────────────────────── */
    .overlay { position: fixed; inset: 0; background: rgba(10,22,40,0.78); display: none; align-items: center; justify-content: center; padding: 16px; z-index: 100; }
    .overlay.on { display: flex; }
    .mbox { background: var(--white); border-radius: 20px; padding: 22px 20px; max-width: 340px; width: 100%; max-height: 92vh; overflow-y: auto; }
    .mtitle { font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .mbody  { font-size: 13px; color: #475569; margin-bottom: 14px; line-height: 1.6; }
    .mbtns  { display: flex; flex-direction: column; gap: 8px; }
    .mbtns button { padding: 13px; border: none; border-radius: 12px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 14px; cursor: pointer; }
    .btn-pay       { background: var(--green); color: #fff; }
    .btn-pay:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-loan      { background: var(--orange); color: #fff; font-size: 12px; }
    .btn-game-over { background: var(--red); color: #fff; }
    .btn-play-again { background: var(--navy); color: #fff; font-size: 16px; }

    /* ── NOTA FINAL ───────────────────────────────────────── */
    .grade-wrap { text-align: center; margin: 14px 0 10px; }
    .grade-circle {
      display: inline-flex; align-items: center; justify-content: center;
      width: 88px; height: 88px; border-radius: 50%;
      font-family: 'Oswald', sans-serif; font-size: 52px; font-weight: 700; border: 4px solid;
    }
    .grade-A { background: var(--greenbg); color: var(--green); border-color: var(--green); }
    .grade-B { background: #e8f4ff; color: #1a5296; border-color: #1a5296; }
    .grade-C { background: var(--warnbg); color: var(--warn); border-color: var(--warn); }
    .grade-D { background: var(--orangebg); color: var(--orange); border-color: var(--orange); }
    .grade-F { background: var(--redbg); color: var(--red); border-color: var(--red); }
    .grade-label { font-weight: 800; font-size: 13px; margin-top: 6px; color: var(--navy); }
    .grade-score { font-size: 11px; color: var(--gray); margin-top: 2px; }

    .score-bars { margin: 12px 0; }
    .score-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .score-lbl  { font-size: 10px; font-weight: 700; color: var(--gray); width: 72px; flex-shrink: 0; }
    .score-bar-o { flex: 1; height: 7px; background: #eef3fb; border-radius: 4px; overflow: hidden; }
    .score-bar-f { height: 100%; border-radius: 4px; }
    .score-pts  { font-size: 10px; font-weight: 800; color: var(--navy); width: 36px; text-align: right; flex-shrink: 0; }

    /* ── METRICS ──────────────────────────────────────────── */
    .metrics { width: 100%; font-size: 12px; margin-bottom: 14px; border-collapse: collapse; }
    .metrics td { padding: 6px 0; border-bottom: 1px solid #f0f4f8; color: #475569; }
    .metrics td:last-child { text-align: right; font-weight: 800; color: var(--navy); }
    .t-win  { color: var(--green) !important; }
    .t-lose { color: var(--red) !important; }
    .retro-box { background: #f4f8ff; border: 2px solid #c8ddf5; border-radius: 10px; padding: 10px 12px; font-size: 12px; color: #3a5a80; margin-bottom: 14px; line-height: 1.5; font-weight: 600; }

    /* ── TUTORIAL ─────────────────────────────────────────── */
    .tut-overlay { position: fixed; inset: 0; background: rgba(10,22,40,0.9); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 200; }
    .tut-box { background: var(--white); border-radius: 24px; padding: 28px 22px 22px; max-width: 330px; width: 100%; text-align: center; }
    .tut-emoji { font-size: 52px; margin-bottom: 12px; }
    .tut-title { font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 700; color: var(--navy); margin-bottom: 10px; }
    .tut-desc { font-size: 13px; color: #4a6080; line-height: 1.65; margin-bottom: 20px; font-weight: 600; }
    .tut-hl { display: inline-block; background: #e8f0ff; border-radius: 6px; padding: 1px 6px; color: var(--navy); font-weight: 800; }
    .tut-dots { display: flex; justify-content: center; gap: 7px; margin-bottom: 18px; }
    .tut-dot { width: 8px; height: 8px; border-radius: 50%; background: #c8ddf5; transition: background 0.3s; }
    .tut-dot.on { background: var(--navy); }
    .tut-btn { width: 100%; background: var(--navy); color: #fff; border: none; border-radius: 14px; padding: 14px; font-family: 'Oswald', sans-serif; font-size: 17px; font-weight: 700; cursor: pointer; letter-spacing: 0.5px; }
    .tut-btn.go { background: var(--green); }
    .tut-skip { margin-top: 10px; font-size: 11px; color: var(--gray); cursor: pointer; text-decoration: underline; display: inline-block; }

    /* ── FOOTER ───────────────────────────────────────────── */
    .footer { text-align: center; font-size: 10px; color: var(--gray); margin-top: 18px; font-weight: 600; letter-spacing: 0.5px; }
  </style>
</head>
<body>

<!-- Guide bar (interactive tutorial) -->
<div class="guide-bar" id="guide-bar">
  <div class="guide-step-num" id="guide-step-num"></div>
  <div class="guide-msg" id="guide-msg"></div>
  <div class="guide-skip" onclick="skipGuide()">Pular guia</div>
</div>

<!-- Tutorial slides -->
<div class="tut-overlay" id="tut-overlay">
  <div class="tut-box" id="tut-box"></div>
</div>

<div class="wrap" id="app-wrap">
  <div id="app"></div>
</div>

<!-- Modal: parcela -->
<div class="overlay" id="ov-parcela">
  <div class="mbox" id="box-parcela"></div>
</div>

<!-- Modal: fim de jogo -->
<div class="overlay" id="ov-fim">
  <div class="mbox" id="box-fim"></div>
</div>

<script>
// ============================================================
// TUTORIAL SLIDES
// ============================================================
var TUT = [
  {
    emoji: '⚓',
    title: 'Seu porto, sua dívida',
    desc: 'Você herdou um porto com <span class="tut-hl">4 parcelas de dívida</span> a pagar em 6 semanas. Atenda os barcos, gere receita e quite tudo — ou perde o porto.',
    btn: 'Próximo →',
  },
  {
    emoji: '🆚',
    title: 'Cuidado com o rival',
    desc: 'Às vezes um concorrente tenta roubar seus clientes com desconto.<br><br><b>Igualar:</b> você fica com o barco, ganha menos.<br><b>Recusar:</b> perde o barco e sua reputação cai.',
    btn: 'Próximo →',
  },
  {
    emoji: '🎯',
    title: 'Cada semana tem um objetivo',
    desc: 'Toda semana há uma meta. Cumpri-la dá bônus de reputação. Sua nota final (A a F) depende de caixa, reputação e objetivos cumpridos.',
    btn: '🚢 Começar — vou te guiar!',
    last: true,
  },
];

var tutStep = 0;

function renderTutorial() {
  var ov = document.getElementById('tut-overlay');
  if (tutStep >= TUT.length) { ov.style.display = 'none'; updateGuideBar(); render(); return; }
  ov.style.display = 'flex';
  var sl = TUT[tutStep];
  var dots = TUT.map(function(_, i) {
    return '<div class="tut-dot' + (i === tutStep ? ' on' : '') + '"></div>';
  }).join('');
  document.getElementById('tut-box').innerHTML =
    '<div class="tut-emoji">' + sl.emoji + '</div>'
    + '<div class="tut-title">' + sl.title + '</div>'
    + '<div class="tut-desc">' + sl.desc + '</div>'
    + '<div class="tut-dots">' + dots + '</div>'
    + '<button class="tut-btn' + (sl.last ? ' go' : '') + '" onclick="nextTut()">' + sl.btn + '</button>'
    + (!sl.last ? '<div class="tut-skip" onclick="skipTut()">Pular tutorial</div>' : '');
}

function nextTut() { tutStep++; renderTutorial(); }
function skipTut() { tutStep = TUT.length; renderTutorial(); }

// ============================================================
// EVENTS POOL
// ============================================================
var EVENTS_POOL = [
  null, null, null,
  { type:'tempestade',   icon:'⛈️', label:'Tempestade',     desc:'Mar agitado. Barcos grandes demoram +1 turno esta semana.' },
  { type:'fiscalizacao', icon:'🔍', label:'Fiscalização',    desc:'Agentes alfandegários no porto. Nenhuma receita neste dia.' },
  { type:'demanda',      icon:'📈', label:'Demanda Alta',    desc:'Movimento intenso! Um barco extra chega ao porto hoje.' },
];

// ============================================================
// OBJETIVOS SEMANAIS
// ============================================================
var OBJ_POOL = [
  { id:'serve3',  label:'Atenda 3 barcos',       detail:'+10 rep ao cumprir', type:'served',  target:3,  rep:10 },
  { id:'nolose',  label:'Sem barcos perdidos',    detail:'+12 rep ao cumprir', type:'lost',    target:0,  rep:12, invert:true },
  { id:'rival1',  label:'Iguale 1 rival',         detail:'+10 rep ao cumprir', type:'rival',   target:1,  rep:10 },
  { id:'serve4',  label:'Atenda 4 barcos',        detail:'+12 rep ao cumprir', type:'served',  target:4,  rep:12 },
  { id:'serve5',  label:'Atenda 5 barcos',        detail:'+15 rep ao cumprir', type:'served',  target:5,  rep:15 },
  { id:'rep70',   label:'Reputação 70+ ao final', detail:'+12 rep ao cumprir', type:'rep',     target:70, rep:12 },
];

function checkObjective(obj, S) {
  if (!obj) return false;
  switch (obj.type) {
    case 'served': return S.weeklyMetrics.boatsServed >= obj.target;
    case 'lost':   return S.weeklyMetrics.boatsLost === 0;
    case 'rival':  return S.weeklyMetrics.rivalMatched >= obj.target;
    case 'rep':    return S.rep >= obj.target;
    default:       return false;
  }
}

var uid = 1;
var S;

function freshState() {
  uid = 1;
  var st = {
    turn:   1,
    cash:   CONFIG.startCash,
    slots:  makeArr(CONFIG.slotsBase, function() { return { boat:null, workerId:null }; }),
    workers:makeArr(CONFIG.workersBase, function(i){ return { id:i+1, busy:0 }; }),
    upgrades: { doca:false, armazem:false },
    parcelas: CONFIG.parcelas.map(function(p){
      return { week:p.week, dueTurn:p.dueTurn, amount:p.amount, paid:false, surprise:!!p.surprise };
    }),
    phase:          'playing',
    pendingParcela: null,
    selWorker:      null,
    msg:            '',
    msgType:        '',
    metrics: { boatsServed:0, boatsLost:0, rivalMatched:0, rivalHeld:0, revenue:0, loansTaken:0, objectivesCompleted:0 },
    weeklyMetrics:  { boatsServed:0, boatsLost:0, rivalMatched:0 },
    currentObjective: OBJ_POOL[0],
    endReason:      '',
    rep:            65,
    weekEvent:      null,
    weekEventApplied: false,
    tempestadeWeek: -1,
    guideStep:      1,
    revelado5:      false,
  };
  // Pre-spawn tutorial boat so guide step 1 has something to do
  st.slots[0].boat = {
    id: uid++, value: CONFIG.boatPhases[0].small, opTurns: 1,
    emoji: '⛵', label: 'PEQN', type: 'small',
    progress: 0, rival: false, matched: false, matchedValue: 0,
  };
  return st;
}

function makeArr(n, fn) { var a=[]; for(var i=0;i<n;i++) a.push(fn(i)); return a; }
function rnd() { return Math.random(); }
function weekOf(t) { return Math.ceil(t / CONFIG.turnsPerWeek); }

function getBoatValues() {
  var week = weekOf(S.turn);
  var phase = Math.min(Math.floor((week - 1) / 2), 2);
  return CONFIG.boatPhases[phase];
}

function getRivalDiscount() {
  return weekOf(S.turn) <= 3 ? CONFIG.rivalDiscount : CONFIG.rivalDiscountLate;
}

function repColor(r){ return r>=60?'#1a7a40':r>=35?'#d97706':'#c23030'; }
function repLabel(r){ return r>=80?'Excelente':r>=60?'Boa':r>=40?'Regular':r>=20?'Ruim':'Crítica'; }

// ── Boat ───────────────────────────────────────────────────
function rollArrivals(){
  if(S.rep<=0) return 0;
  var table = S.rep < 30
    ? [{n:0,p:0.35},{n:1,p:0.55},{n:2,p:0.10}]
    : CONFIG.arrivals;
  var r=rnd(), acc=0;
  for(var i=0;i<table.length;i++){ acc+=table[i].p; if(r<=acc) return table[i].n; }
  return 0;
}

function makeBoat(){
  var vals = getBoatValues();
  var large = rnd() < 0.5;
  var baseVal = large ? vals.large : vals.small;
  var tempActive = S.weekEvent && S.weekEvent.type==='tempestade' && weekOf(S.turn)===S.tempestadeWeek;
  var extraT = (tempActive && large) ? 1 : 0;
  return {
    id:uid++, value:baseVal, opTurns:(large?2:1)+extraT,
    emoji:large?'🚢':'⛵', label:large?'GRNDE':'PEQN', type:large?'large':'small',
    progress:0, rival:false, matched:false, matchedValue:0,
  };
}

function spawnBoats(){
  var extra = (S.weekEvent && S.weekEvent.type==='demanda' && !S.weekEventApplied) ? 1 : 0;
  if(extra) S.weekEventApplied=true;
  var empties = S.slots.filter(function(x){ return !x.boat; }).length;
  var n = Math.min(rollArrivals()+extra, empties);
  for(var i=0;i<S.slots.length&&n>0;i++){
    if(!S.slots[i].boat){ S.slots[i].boat=makeBoat(); S.slots[i].workerId=null; n--; }
  }
  // Rival?
  if(rnd()<CONFIG.rivalChance){
    var cands = S.slots
      .filter(function(x){ return x.boat&&!x.boat.rival&&x.boat.progress===0; })
      .sort(function(a,b){ return b.boat.value-a.boat.value; });
    if(cands.length){
      cands[0].boat.rival=true;
      setMsg('⚠️ Rival disputando um cliente! Veja as docas.','warn');
    }
  }
}

function checkEnd(){
  if(S.cash<0){ S.phase='lost'; S.endReason='Caixa negativo. Operação inviável.'; return; }
  if(S.turn>CONFIG.turnsTotal){
    var allPaid=S.parcelas.every(function(p){ return p.paid; });
    S.phase = (allPaid&&S.cash>=0)?'won':'lost';
    S.endReason = S.phase==='won'
      ? 'Você quitou todas as parcelas e manteve o porto no azul!'
      : 'Fim do prazo com dívida em aberto.';
    return;
  }
  spawnBoats();
}

function setMsg(txt,type){ S.msg=txt; S.msgType=type||''; }

var GUIDE_MSGS = {
  1: 'Toque num trabalhador LIVRE para selecioná-lo',
  2: 'Agora toque na doca com o barco',
  3: 'Clique AVANÇAR DIA para operar e faturar',
};

function updateGuideBar(){
  var bar = document.getElementById('guide-bar');
  var wrap = document.getElementById('app-wrap');
  if (!bar) return;
  if (S.guideStep === 0) {
    bar.style.display = 'none';
    if (wrap) wrap.style.paddingTop = '12px';
  } else {
    bar.style.display = 'flex';
    if (wrap) wrap.style.paddingTop = '68px';
    document.getElementById('guide-step-num').textContent = 'Passo ' + S.guideStep + ' de 3';
    document.getElementById('guide-msg').textContent = GUIDE_MSGS[S.guideStep] || '';
  }
}

function skipGuide(){
  S.guideStep = 0;
  setMsg('Modo livre! Aloque trabalhadores nos barcos e avance o dia.', '');
  updateGuideBar();
  render();
}

// ============================================================
// ACTIONS
// ============================================================
function pickWorker(id){
  if(S.phase!=='playing') return;
  var w=S.workers.find(function(x){ return x.id===id; });
  if(!w||w.busy>0) return;
  S.selWorker=(S.selWorker===id)?null:id;
  if(S.selWorker){
    setMsg('👆 Trabalhador selecionado. Toque uma doca com barco.','');
    if(S.guideStep===1) S.guideStep=2;
  } else {
    setMsg('','');
    if(S.guideStep===2) S.guideStep=1;
  }
  updateGuideBar();
  render();
}

function assignToSlot(idx){
  if(S.phase!=='playing') return;
  var slot=S.slots[idx];
  if(!S.selWorker){ setMsg('👆 Primeiro toque num trabalhador LIVRE (verde).','warn'); render(); return; }
  if(!slot.boat){ setMsg('Doca vazia — não há barco aqui.','warn'); render(); return; }
  if(slot.workerId!=null){ setMsg('Essa doca já tem trabalhador operando.','warn'); render(); return; }
  if(slot.boat.rival&&!slot.boat.matched){ setMsg('Resolva a oferta do rival antes de alocar.','warn'); render(); return; }
  slot.workerId=S.selWorker; S.selWorker=null;
  setMsg('✅ Alocado! Clique AVANÇAR DIA para operar.','good');
  if(S.guideStep===2) S.guideStep=3;
  updateGuideBar();
  render();
}

function rivalDecision(idx, match){
  var slot=S.slots[idx];
  if(!slot||!slot.boat||!slot.boat.rival) return;
  var disc=getRivalDiscount();
  if(match){
    var dv=Math.round(slot.boat.value*(1-disc));
    slot.boat.matched=true; slot.boat.rival=false; slot.boat.matchedValue=dv;
    S.metrics.rivalMatched++; S.weeklyMetrics.rivalMatched++;
    S.rep=Math.min(100,S.rep+5);
    setMsg('🤝 Preço igualado. Barco aceito por R$'+dv+' (em vez de R$'+slot.boat.value+'). Aloque um trabalhador.','');
  } else {
    S.metrics.rivalHeld++; S.metrics.boatsLost++; S.weeklyMetrics.boatsLost++;
    slot.boat=null; slot.workerId=null;
    S.rep=Math.max(0,S.rep-15);
    setMsg('❌ Barco foi para o rival. Reputação caiu.','bad');
  }
  render();
}

function advanceDay(){
  if(S.phase!=='playing') return;
  if(S.guideStep>0&&S.guideStep<3){ setMsg('Siga o guia primeiro! 👆','warn'); render(); return; }

  var blockRev=(S.weekEvent&&S.weekEvent.type==='fiscalizacao'&&!S.weekEventApplied);
  if(blockRev) S.weekEventApplied=true;

  for(var i=0;i<S.slots.length;i++){
    var slot=S.slots[i];
    if(!slot.boat) continue;
    if(slot.workerId!=null){
      slot.boat.progress++;
      if(slot.boat.progress>=slot.boat.opTurns){
        if(!blockRev){
          var v=slot.boat.matched?slot.boat.matchedValue:slot.boat.value;
          if(S.upgrades.armazem&&slot.boat.type==='large') v+=CONFIG.armazemBonus;
          S.cash+=v; S.metrics.revenue+=v;
        }
        S.metrics.boatsServed++; S.weeklyMetrics.boatsServed++;
        S.rep=Math.min(100,S.rep+4);
        var w=S.workers.find(function(x){ return x.id===slot.workerId; });
        if(w) w.busy=0;
        slot.boat=null; slot.workerId=null;
      } else {
        var w2=S.workers.find(function(x){ return x.id===slot.workerId; });
        if(w2) w2.busy=slot.boat.opTurns-slot.boat.progress;
      }
    } else {
      // Boat left without worker → lost
      S.metrics.boatsLost++; S.weeklyMetrics.boatsLost++;
      S.rep=Math.max(0,S.rep-5);
      slot.boat=null;
    }
  }

  if(S.guideStep===3){ S.guideStep=0; setMsg('✅ Perfeito! Você aprendeu o básico. Agora é com você!','good'); }

  var prevTurn=S.turn;
  S.turn++; S.selWorker=null;
  if(S.guideStep===0&&S.msg==='') setMsg('','');

  // Week end?
  if(prevTurn%CONFIG.turnsPerWeek===0){
    processWeekEnd(weekOf(prevTurn));
  }

  // Parcela devida?
  var due=null;
  for(var j=0;j<S.parcelas.length;j++){
    if(!S.parcelas[j].paid&&S.parcelas[j].dueTurn===prevTurn){ due=S.parcelas[j]; break; }
  }
  if(due){ S.pendingParcela=due; S.phase='parcela'; render(); return; }

  updateGuideBar();
  checkEnd();
  render();
}

function processWeekEnd(endedWeek){
  // Check objective
  var obj=S.currentObjective;
  var objDone=checkObjective(obj,S);
  var objRep=objDone?obj.rep:0;
  if(objDone){ S.rep=Math.min(100,S.rep+objRep); S.metrics.objectivesCompleted++; }

  // Reset weekly metrics
  S.weeklyMetrics={boatsServed:0,boatsLost:0,rivalMatched:0};

  // Assign next objective
  var nextWeek=endedWeek+1;
  if(nextWeek<=6){ S.currentObjective=OBJ_POOL[(nextWeek-1)%OBJ_POOL.length]; }

  // Salary + maintenance
  var sal=CONFIG.salaryBase+(S.upgrades.doca?CONFIG.salaryDoca:0);
  S.cash-=(sal+CONFIG.maintenance);

  // Reveal surprise parcela at end of week 3
  if(endedWeek===3&&!S.revelado5){
    S.revelado5=true;
  }

  // Roll event for next week
  var ev=EVENTS_POOL[Math.floor(rnd()*EVENTS_POOL.length)];
  S.weekEvent=ev; S.weekEventApplied=false;
  if(ev&&ev.type==='tempestade') S.tempestadeWeek=weekOf(S.turn);

  // Compose message (override guide completion msg if exists)
  var objPart=obj?(objDone?'🎯 Objetivo: ✓ +'+objRep+' rep!':'📋 Objetivo não cumprido.'):'';
  var wMsg='⚓ Sem.'+endedWeek+' encerrada — -R$'+(sal+CONFIG.maintenance)+' em custos. '+objPart;
  if(endedWeek===3) wMsg+=' ⚠️ Nova dívida revelada na Sem.5!';
  if(ev) wMsg+=' '+ev.icon+' '+ev.label+'!';
  setMsg(wMsg, objDone?'good':'warn');
}

function payParcela(){
  var p=S.pendingParcela;
  S.cash-=p.amount; p.paid=true;
  S.pendingParcela=null; S.phase='playing';
  setMsg('✅ Parcela de R$'+p.amount+' paga. Fique de olho na próxima!','good');
  checkEnd(); render();
}

function takeLoan(){
  var p=S.pendingParcela;
  var shortfall=p.amount-S.cash;
  S.cash+=shortfall; S.cash-=p.amount;
  var penalty=Math.round(shortfall*(CONFIG.loanMult-1));
  for(var i=0;i<S.parcelas.length;i++){
    if(!S.parcelas[i].paid&&S.parcelas[i].dueTurn>p.dueTurn){
      S.parcelas[i].amount+=penalty; break;
    }
  }
  S.metrics.loansTaken++;
  p.paid=true; S.pendingParcela=null; S.phase='playing';
  setMsg('⚠️ Empréstimo emergencial. +R$'+penalty+' adicionados à próxima parcela.','warn');
  checkEnd(); render();
}

function cantPay(){ S.phase='lost'; S.endReason='Não conseguiu pagar a parcela final. Porto perdido.'; render(); }

function buyUpgrade(type){
  if(S.phase!=='playing') return;
  if(type==='doca'){
    if(S.upgrades.doca) return;
    if(S.cash<CONFIG.upgradeDocaCost){ setMsg('Caixa insuficiente. Precisa de R$'+CONFIG.upgradeDocaCost+'.','warn'); render(); return; }
    S.cash-=CONFIG.upgradeDocaCost; S.upgrades.doca=true;
    S.slots.push({boat:null,workerId:null});
    S.workers.push({id:S.workers.length+1,busy:0});
    setMsg('🏗️ Doca Extra instalada! 3ª doca + 3º trabalhador. +R$'+CONFIG.salaryDoca+'/sem de salário.','good');
  } else if(type==='armazem'){
    if(S.upgrades.armazem) return;
    if(S.cash<CONFIG.upgradeArmazemCost){ setMsg('Caixa insuficiente. Precisa de R$'+CONFIG.upgradeArmazemCost+'.','warn'); render(); return; }
    S.cash-=CONFIG.upgradeArmazemCost; S.upgrades.armazem=true;
    setMsg('🏚️ Armazém construído! Barcos grandes rendem +R$'+CONFIG.armazemBonus+' a cada viagem.','good');
  }
  render();
}

function reset(){ S=freshState(); tutStep=0; renderTutorial(); }

function calcGrade(){
  if(S.phase!=='won') return { letter:'F', score:0, label:'Porto falido', cash:0, rep:0, obj:0 };
  var cashPts = Math.min(25, Math.floor(S.cash/36));
  var repPts  = Math.min(35, Math.floor(S.rep*0.35));
  var objPts  = S.metrics.objectivesCompleted*5;
  var base    = 10; // survival bonus
  var total   = base+cashPts+repPts+objPts;
  var letter  = total>=85?'A':total>=70?'B':total>=55?'C':total>=40?'D':'F';
  var labels  = { A:'Porto Modelo!', B:'Gestão Eficiente', C:'Sobreviveu com esforço', D:'Quase afundou', F:'Porto falido' };
  return { letter:letter, score:total, label:labels[letter], cash:cashPts, rep:repPts, obj:objPts };
}

// RENDER
// ============================================================
function render(){
  var week   = weekOf(S.turn);
  var dispDay= Math.min(S.turn, CONFIG.turnsTotal);
  var nextP  = null;
  for(var i=0;i<S.parcelas.length;i++){ if(!S.parcelas[i].paid){ nextP=S.parcelas[i]; break; } }

  var cashCls=S.cash>=400?'cash-ok':(S.cash>=150?'cash-warn':'cash-bad');

  // ── PARCELAS ──────────────────────────────────────────────
  var pHtml='';
  for(var i=0;i<S.parcelas.length;i++){
    var p=S.parcelas[i];
    var isHidden=p.surprise&&!S.revelado5&&week<4;
    var cls=p.paid?'p-paid':(nextP&&nextP.dueTurn===p.dueTurn?'p-due':(isHidden?'p-hidden':'p-future'));
    pHtml+='<div class="p-chip '+cls+'">'
      +(p.paid?'✓ Pago':isHidden?'??? Sem.5':'R$'+p.amount)
      +'<br>Sem.'+p.week
      +'</div>';
  }

  // ── REPUTAÇÃO ──────────────────────────────────────────────
  var repCol=repColor(S.rep), repLbl=repLabel(S.rep);
  var repWarn=S.rep<30?'<div class="rep-warning">⚠ Menos barcos chegando</div>':'';

  // ── OBJETIVO SEMANAL ───────────────────────────────────────
  var obj=S.currentObjective;
  var objDone=obj?checkObjective(obj,S):false;
  var objHtml='';
  if(obj){
    objHtml='<div class="obj-card'+(objDone?' obj-done':'')+'">'
      +'<div class="obj-icon">'+(objDone?'✅':'🎯')+'</div>'
      +'<div class="obj-body">'
      +'<div class="obj-label">'+obj.label+'</div>'
      +'<div class="obj-sub">'+obj.detail+'</div>'
      +'</div>'
      +'<div class="obj-badge '+(objDone?'obj-badge-done':'obj-badge-pen')+'">'+(objDone?'Cumprido!':'Pendente')+'</div>'
      +'</div>';
  }

  // ── EVENTO ─────────────────────────────────────────────────
  var evHtml='';
  if(S.weekEvent){
    var ev=S.weekEvent;
    evHtml='<div class="event-card ev-'+ev.type+'">'
      +'<div class="event-emoji">'+ev.icon+'</div>'
      +'<div><div class="event-title">'+ev.label+'</div>'
      +'<div class="event-desc">'+ev.desc+'</div></div>'
      +'</div>';
  }

  // ── DOCAS ──────────────────────────────────────────────────
  var docasHtml='';
  var guideGlowDock=S.guideStep===2;
  for(var i=0;i<S.slots.length;i++){
    var slot=S.slots[i];
    var b=slot.boat;
    var isTarget=S.selWorker!=null&&b&&slot.workerId==null&&!(b.rival&&!b.matched);
    var isRivalPend=b&&b.rival&&!b.matched;
    var guideDoc=guideGlowDock&&b&&!slot.workerId&&!(b.rival&&!b.matched);

    var cls='doca'
      +(!b?' empty':'')
      +(isTarget?' target':'')
      +(isRivalPend?' rival-pending':'')
      +(guideDoc?' guide-pulse':'');

    docasHtml+='<div class="'+cls+'" onclick="assignToSlot('+i+')">';
    docasHtml+='<div class="doca-num">DOCA<br>'+(i+1)+'</div>';

    if(b){
      var dispV=b.matched?b.matchedValue:b.value;
      var armazBonus=(S.upgrades.armazem&&b.type==='large'&&!b.matched)?'+R$'+CONFIG.armazemBonus:'';
      var badgeCls=b.rival?'boat-rival-b':(b.type==='large'?'boat-large':'boat-small');
      var rivalLabel=weekOf(S.turn)<=3?'-15% rival':'-25% rival';
      docasHtml+='<div class="boat-badge '+badgeCls+'">'+b.emoji
        +'<div class="boat-badge-sub">'+(b.rival?rivalLabel:b.label)+'</div></div>';
      docasHtml+='<div class="boat-info">';
      docasHtml+='<div class="boat-revenue">R$'+dispV+(b.matched?' <span class="boat-discount">(igualado)</span>':'')+'</div>';
      if(armazBonus) docasHtml+='<div class="boat-bonus">🏚️ '+armazBonus+' armazém</div>';
      docasHtml+='<div class="boat-progress">'+b.progress+'/'+b.opTurns+' turno(s)</div>';
      if(slot.workerId){
        var wk=S.workers.find(function(x){ return x.id===slot.workerId; });
        if(wk) docasHtml+='<div class="boat-worker">👷 Trabalhador #'+wk.id+'</div>';
      }
      docasHtml+='</div>';
      if(isRivalPend){
        var disc=getRivalDiscount();
        var dv2=Math.round(b.value*(1-disc));
        var discPct=weekOf(S.turn)<=3?'15%':'25%';
        docasHtml+='<div class="rival-decision">'
          +'<button class="btn-ig" onclick="event.stopPropagation();rivalDecision('+i+',true)">Igualar<br>R$'+dv2+'</button>'
          +'<button class="btn-rc" onclick="event.stopPropagation();rivalDecision('+i+',false)">Recusar<br>-rep ↓</button>'
          +'</div>';
      }
    } else {
      docasHtml+='<div style="flex:1;font-size:11px;color:#9bb0c8;font-style:italic;font-weight:600;">Aguardando barco...</div>';
    }
    docasHtml+='</div>';
  }

  // ── WORKERS ────────────────────────────────────────────────
  var wHtml='';
  var guideGlowWorker=S.guideStep===1;
  for(var i=0;i<S.workers.length;i++){
    var w=S.workers[i];
    var free=w.busy===0;
    var sel=S.selWorker===w.id;
    var cls2=sel?'wsel':(free?'wfree':'wbusy')+(guideGlowWorker&&free?' guide-pulse':'');
    var oc=free?'pickWorker('+w.id+')':'';
    wHtml+='<button class="wbtn '+cls2+'" onclick="'+oc+'">'
      +'👷'
      +'<div class="wsub">'+(sel?'Selecionado':free?'Livre':'Ocupado '+w.busy+'t')+'</div>'
      +'</button>';
  }

  // ── UPGRADES ───────────────────────────────────────────────
  var playing=S.phase==='playing';
  var canDoca=!S.upgrades.doca&&S.cash>=CONFIG.upgradeDocaCost;
  var canArmazem=!S.upgrades.armazem&&S.cash>=CONFIG.upgradeArmazemCost;

  var docaLabel=S.upgrades.doca
    ?'✓ Doca Extra'
    :'🏗️ Doca Extra<br><span class="upg-cost">R$'+CONFIG.upgradeDocaCost+'</span><span class="upg-sub">+1 doca · +1 trab.</span>';
  var armazLabel=S.upgrades.armazem
    ?'✓ Armazém'
    :'🏚️ Armazém<br><span class="upg-cost">R$'+CONFIG.upgradeArmazemCost+'</span><span class="upg-sub">+R$'+CONFIG.armazemBonus+' por barco grande</span>';

  var docaCls='upg-btn'+(S.upgrades.doca?' upg-done':canDoca?' upg-afford':'');
  var armazCls='upg-btn'+(S.upgrades.armazem?' upg-done':canArmazem?' upg-afford':'');

  // ── MSG ────────────────────────────────────────────────────
  var msgCls='msg-box msg-'+(S.msgType||'default');
  var msgTxt=S.msg||(S.guideStep===0?'👆 Selecione um trabalhador e toque numa doca com barco.':'');

  // ── ADVANCE BTN ────────────────────────────────────────────
  var advDisabled=!playing||(S.guideStep>0&&S.guideStep<3);
  var advCls='btn-adv'+(S.guideStep===3?' guide-pulse':'');

  document.getElementById('app').innerHTML=
    '<div class="header"><div class="header-anchor">⚓</div><div class="header-title">BR PORT</div></div>'
    +'<div class="header-sub">Protótipo v3.0 — 6 semanas · '+CONFIG.turnsTotal+' dias</div>'

    +'<div class="hud">'
    +'<div class="hud-card"><div class="hud-label">Dia</div><div class="hud-value">'+dispDay+'/'+CONFIG.turnsTotal+'</div><div class="hud-sub">Semana '+Math.min(week,6)+'</div></div>'
    +'<div class="hud-card"><div class="hud-label">Caixa</div><div class="hud-value '+cashCls+'">R$'+S.cash+'</div></div>'
    +'<div class="hud-card"><div class="hud-label">Próx. Parcela</div><div class="hud-value" style="font-size:15px">'+(nextP?'R$'+nextP.amount:'✓')+'</div><div class="hud-sub">'+(nextP?'Sem.'+nextP.week:'Tudo pago!')+'</div></div>'
    +'</div>'

    +'<div class="parcelas-row">'+pHtml+'</div>'

    +'<div class="rep-row">'
    +'<div class="rep-emoji">⭐</div>'
    +'<div class="rep-label">Rep.</div>'
    +'<div class="rep-bar-outer"><div class="rep-bar-inner" style="width:'+S.rep+'%;background:'+repCol+'"></div></div>'
    +'<div class="rep-text" style="color:'+repCol+'">'+repLbl+'</div>'
    +repWarn
    +'</div>'

    +objHtml
    +evHtml

    +'<div class="sec">Docas ('+S.slots.length+')</div>'
    +docasHtml

    +'<div class="sec">Trabalhadores</div>'
    +'<div class="workers">'+wHtml+'</div>'

    +'<div class="sec">Melhorias</div>'
    +'<div class="upgrade-row">'
    +'<button class="'+docaCls+'" onclick="buyUpgrade(\'doca\')"'+((!playing||S.upgrades.doca)?' disabled':'')+'>'+docaLabel+'</button>'
    +'<button class="'+armazCls+'" onclick="buyUpgrade(\'armazem\')"'+((!playing||S.upgrades.armazem)?' disabled':'')+'>'+armazLabel+'</button>'
    +'</div>'

    +'<div class="'+msgCls+'">'+msgTxt+'</div>'

    +'<div class="btn-adv-wrap"><button class="'+advCls+'" onclick="advanceDay()"'+(advDisabled?' disabled':'')+'>▶ AVANÇAR DIA</button></div>'

    +'<div class="footer">BR Port • Protótipo v3.0 • diagnóstico de loop</div>';

  updateGuideBar();

  // ── MODAL PARCELA ──────────────────────────────────────────
  var ovP=document.getElementById('ov-parcela');
  var bxP=document.getElementById('box-parcela');
  if(S.phase==='parcela'&&S.pendingParcela){
    var p=S.pendingParcela;
    var canPay=S.cash>=p.amount;
    var isLast=p.week===6;
    var isSurprise=p.surprise&&!p._surpriseShown;
    if(isSurprise) p._surpriseShown=true;
    bxP.innerHTML=
      '<div class="mtitle '+(isSurprise?'t-lose':'')+'">'+( isSurprise?'⚠️ Dívida inesperada!':'💳 Parcela da dívida')+'</div>'
      +(isSurprise?'<div style="background:#fff3cd;border-radius:10px;padding:10px 12px;font-size:12px;color:#7a4f00;font-weight:700;margin-bottom:12px">Uma cláusula contratual esquecida voltou a cobrar. Pague ou perca parte do porto.</div>':'')
      +'<div class="mbody">Valor: <strong>R$'+p.amount+'</strong><br>Caixa atual: <strong style="color:'+(canPay?'#1a7a40':'#c23030')+'">R$'+S.cash+'</strong><br><br>'+(canPay?'Você consegue pagar sem problema.':'⚠️ Caixa insuficiente para pagar.')+'</div>'
      +'<div class="mbtns">'
      +'<button class="btn-pay" onclick="payParcela()"'+(canPay?'':' disabled')+'>Pagar R$'+p.amount+'</button>'
      +(!canPay&&!isLast?'<button class="btn-loan" onclick="takeLoan()">⚠️ Empréstimo emergencial<br><small style="font-weight:400">+20% na próxima parcela</small></button>':'')
      +(!canPay&&isLast?'<button class="btn-game-over" onclick="cantPay()">Não consigo pagar</button>':'')
      +'</div>';
    ovP.classList.add('on');
  } else { ovP.classList.remove('on'); }

  // ── MODAL FIM DE JOGO ──────────────────────────────────────
  var ovF=document.getElementById('ov-fim');
  var bxF=document.getElementById('box-fim');
  if(S.phase==='won'||S.phase==='lost'){
    var isWin=S.phase==='won';
    var gr=calcGrade();

    var retro='';
    if(!isWin){
      if(S.cash<0) retro='💡 O caixa foi a zero. Tente equilibrar receita e parcelas — nunca deixe doca vazia quando há barco.';
      else if(S.metrics.boatsLost>S.metrics.boatsServed) retro='💡 Muitos barcos perdidos. Aloque trabalhadores antes de avançar o dia.';
      else if(S.metrics.loansTaken>0) retro='💡 Os empréstimos cascatearam. Tente pagar com receita operacional, não dívida sobre dívida.';
      else retro='💡 Faltou receita total. Não deixe docas vazias e considere a Doca Extra logo na Sem.2.';
    } else {
      retro = gr.letter==='A' ? '🏆 Gestão impecável! Você otimizou receita, reputação e objetivos.' :
              gr.letter==='B' ? '✅ Sólido. Com mais atenção aos objetivos semanais e upgrades cedo, você chega ao A.' :
              gr.letter==='C' ? '😅 Sobreviveu, mas com margem apertada. Experimente comprar a Doca Extra na Sem.2.' :
              '😰 Passou por pouco. Tente não ignorar barcos e igualar mais o rival.';
    }

    var gradeBlock='';
    if(isWin){
      gradeBlock='<div class="grade-wrap">'
        +'<div class="grade-circle grade-'+gr.letter+'">'+gr.letter+'</div>'
        +'<div class="grade-label">'+gr.label+'</div>'
        +'<div class="grade-score">Pontuação: '+gr.score+' / 100</div>'
        +'</div>'
        +'<div class="score-bars">'
        +'<div class="score-row"><div class="score-lbl">Caixa</div><div class="score-bar-o"><div class="score-bar-f" style="width:'+(gr.cash/25*100)+'%;background:#1a7a40"></div></div><div class="score-pts">'+gr.cash+'/25</div></div>'
        +'<div class="score-row"><div class="score-lbl">Reputação</div><div class="score-bar-o"><div class="score-bar-f" style="width:'+(gr.rep/35*100)+'%;background:#1a5296"></div></div><div class="score-pts">'+gr.rep+'/35</div></div>'
        +'<div class="score-row"><div class="score-lbl">Objetivos</div><div class="score-bar-o"><div class="score-bar-f" style="width:'+(gr.obj/30*100)+'%;background:#d97706"></div></div><div class="score-pts">'+gr.obj+'/30</div></div>'
        +'</div>';
    }

    var rows=[
      ['Dias jogados',''+dispDay+' / '+CONFIG.turnsTotal],
      ['Barcos atendidos',''+S.metrics.boatsServed],
      ['Barcos perdidos',''+S.metrics.boatsLost],
      ['Igualou rival',''+S.metrics.rivalMatched+'x'],
      ['Recusou rival',''+S.metrics.rivalHeld+'x'],
      ['Receita total','R$'+S.metrics.revenue],
      ['Empréstimos',''+S.metrics.loansTaken],
      ['Objetivos cumpridos',''+S.metrics.objectivesCompleted+'/6'],
      ['Reputação final',repLabel(S.rep)+' ('+S.rep+')'],
      ['Saldo final','R$'+S.cash],
    ];
    var tRows=rows.map(function(r){ return '<tr><td>'+r[0]+'</td><td>'+r[1]+'</td></tr>'; }).join('');

    bxF.innerHTML=
      '<div class="mtitle '+(isWin?'t-win':'t-lose')+'">'+(isWin?'🏆 VITÓRIA!':'💸 GAME OVER')+'</div>'
      +'<div class="mbody">'+S.endReason+'</div>'
      +gradeBlock
      +(retro?'<div class="retro-box">'+retro+'</div>':'')
      +'<div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#8299b4;margin-bottom:6px">Resumo da partida</div>'
      +'<table class="metrics">'+tRows+'</table>'
      +'<div class="mbtns"><button class="btn-play-again" onclick="reset()">🔄 Jogar de novo</button></div>';
    ovF.classList.add('on');
  } else { ovF.classList.remove('on'); }
}

// ── INIT ──────────────────────────────────────────────────
S = freshState();
renderTutorial();
</script>
</body>
</html>
